<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <link rel="stylesheet" href="styles/stylesHome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/logo.png">
</head>
<body>
    <div id="loader-overlay">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>
    
    <header>
        <div class="logo">MovieBase</div>
        <nav>
            <span id="user-email-display" style="margin-right: 15px; font-size: 0.8rem; color: #bbb;"></span>
        </nav>
    </header>

    <main id="public-profile-container">
        <section class="profile-header">
            <div class="profile-avatar">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <h1 id="view-username">Cargando...</h1>
            <p id="user-data"></p>
            <p id="user-time"></p>
            <p id="view-stats"></p>
            <div class="perfil-stats-profile" style="margin-top: -10px;">
                <div class="stat-item">
                    <span class="stat-value" id="display-seguidores">0</span>
                    <span class="stat-label">Seguidores</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="display-seguidos">0</span>
                    <span class="stat-label">Siguiendo</span>
                </div>
            </div>
            <div class="container-follows" style="margin-top: 35px; margin-bottom: 35px;">
                <button class="btn-follow">Seguir</button>
            </div>
        </section>

        <section class="profile-content">
            <div class="data valoradas rated-movies-grid">
                <span class="etiqueta-borde">Películas / series valoradas</span>
                <div class="rated-movies-grid tier-list-container">
                    <div class="tier-row s-row" id="tier-s">
                        <div class="tier-label s">S</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row" id="tier-a">
                        <div class="tier-label a">A</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row" id="tier-b">
                        <div class="tier-label b">B</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row" id="tier-c">
                        <div class="tier-label c">C</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row" id="tier-d">
                        <div class="tier-label d">D</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row" id="tier-e">
                        <div class="tier-label e">E</div>
                        <div class="tier-content movies-grid"></div>
                    </div>

                    <div class="tier-row f-row" id="tier-f">
                        <div class="tier-label f">F</div>
                        <div class="tier-content movies-grid"></div>
                    </div>
                </div>
            </div>

            <div class="data" style="margin-bottom: 20px;">
                <span class="etiqueta-borde">Lista de deseos</span>
                <div id="watchlist-grid" class="movies-grid">
                </div>
            </div>
        </section>
    </main>

    <nav class="secondary-footer">
        <a href="home.html" class="nav-item">
            <i class="fa-solid fa-house icon"></i>
        </a>
        <a href="explorar.html" class="nav-item active">
            <i class="fa-solid fa-magnifying-glass icon"></i>
        </a>
        <a href="peliculas.html" class="nav-item">
            <i class="fa-solid fa-clapperboard icon"></i>
        </a>
        <a href="perfil.html" class="nav-item">
            <i class="fa-solid fa-user icon"></i>
        </a>
    </nav>

    <footer>
        &copy; 2026 MovieBase
    </footer>

    <script type="module" src="scripts/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
